<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinterest Modular Feed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-group">
          <div class="brand-mark" aria-label="Pinterest logo">
            <img src="./pinterest-logo.png" alt="Pinterest logo" />
          </div>
          <div class="brand-copy">
            <h1>Home feed</h1>
            <button class="ghost-icon" aria-label="Open feed options">
              <span></span>
              <span></span>
              <span></span>
            </button>
          </div>
        </div>

        <div class="toolbar">
          <button
            class="layout-toggle"
            id="layoutToggle"
            type="button"
            aria-pressed="true"
          >
            <span class="toggle-label">Modular Grid</span>
            <span class="toggle-track is-active" aria-hidden="true">
              <span class="toggle-thumb"></span>
            </span>
          </button>

          <button class="profile-pill" type="button">
            <img
              src="./Images/Profile.jpeg"
              alt="Profile"
            />
            <span>Ciani Foy</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.7 9.3a1 1 0 0 1 1.4 0L12 13.2l3.9-3.9a1 1 0 0 1 1.4 1.4l-4.6 4.6a1 1 0 0 1-1.4 0L6.7 10.7a1 1 0 0 1 0-1.4Z"></path>
            </svg>
          </button>

          <div class="icon-row">
            <button class="round-icon" aria-label="Search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="10.5" cy="10.5" r="6.75"></circle>
                <path d="M15.5 15.5 20 20"></path>
              </svg>
            </button>
            <button class="round-icon has-badge" aria-label="Notifications">
              <span class="badge">8</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4.5a4.5 4.5 0 0 0-4.5 4.5v3.1c0 .85-.29 1.67-.82 2.33L5.2 16.2h13.6l-1.48-1.77a3.62 3.62 0 0 1-.82-2.33V9A4.5 4.5 0 0 0 12 4.5Z"></path>
                <path d="M10.2 18a1.8 1.8 0 0 0 3.6 0"></path>
              </svg>
            </button>
            <button class="round-icon" aria-label="Messages">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4.5c-4.14 0-7.5 2.96-7.5 6.6 0 2.06 1.08 3.9 2.78 5.11L6.9 19.5l3.15-1.73c.62.14 1.27.23 1.95.23 4.14 0 7.5-2.96 7.5-6.6s-3.36-6.9-7.5-6.9Z"></path>
                <circle cx="9" cy="11.3" r="1"></circle>
                <circle cx="12" cy="11.3" r="1"></circle>
                <circle cx="15" cy="11.3" r="1"></circle>
              </svg>
            </button>
            <button class="round-icon" aria-label="Updates">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4.5 11.5V9.6c0-.93.76-1.68 1.7-1.68h3.3v8.16H6.2c-.94 0-1.7-.76-1.7-1.69V11.5Z"></path>
                <path d="M9.5 8.7 16.8 6v12l-7.3-2.7"></path>
                <path d="M18.8 9.1c.88.77 1.4 1.9 1.4 3.09 0 1.2-.52 2.32-1.4 3.09"></path>
              </svg>
            </button>
          </div>

          <button class="mini-avatar" type="button" aria-label="Account">
            <img
              src="./Images/Profile.jpeg"
              alt="Account"
            />
          </button>

          <button class="caret-only" type="button" aria-label="Open account menu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.7 9.3a1 1 0 0 1 1.4 0L12 13.2l3.9-3.9a1 1 0 0 1 1.4 1.4l-4.6 4.6a1 1 0 0 1-1.4 0L6.7 10.7a1 1 0 0 1 0-1.4Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="feed-wrap">
        <nav class="topic-bar" aria-label="Feed topics">
          <button class="topic-pill is-active" type="button">All</button>
          <button class="topic-pill" type="button">Vacation</button>
          <button class="topic-pill" type="button">Wedding</button>
          <button class="topic-pill" type="button">Dream Home</button>
          <button class="topic-pill" type="button">Grad Photoshoot Ideas</button>
          <button class="topic-pill" type="button">Hairstyles</button>
          <button class="topic-pill" type="button">Art</button>
          <button class="topic-pill" type="button">Outfits</button>
          <button class="topic-pill" type="button">She Got Goals</button>
          <button class="topic-pill" type="button">Nails</button>
          <button class="topic-pill" type="button">Tattoos</button>
          <button class="topic-pill" type="button">Bedroom Inspiration</button>
          <button class="topic-pill" type="button">Logo Design</button>
          <button class="topic-pill" type="button">Briana Logo</button>
          <button class="topic-arrow" type="button" aria-label="More topics">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.3 5.7a1 1 0 0 1 1.4 0l5.6 5.6a1 1 0 0 1 0 1.4l-5.6 5.6a1 1 0 1 1-1.4-1.4l4.9-4.9-4.9-4.9a1 1 0 0 1 0-1.4Z"></path>
            </svg>
          </button>
        </nav>
        <section class="modular-grid" id="feed"></section>
      </main>

      <button class="help-fab" aria-label="Help">?</button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
